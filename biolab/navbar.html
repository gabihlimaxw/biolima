<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>biolab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            background: none;
            font-family: "Roboto", sans-serif;
            font-style: normal;
        }

        header {
            width: 100%;
            height: 72px;

            display: flex;
            padding: 0 64px;
            justify-content: space-between;
            align-items: center;
        }

        header > img {
            width: 80px;
            height: 40px;
        }

        .header-nav {
            /* display: flex;
            align-items: center;
            justify-content: center;*/
            gap: 32px; 
            display: flex;
            width: 1440px;
            height: 81px;
            padding: 0 var(--Page-Padding-padding-global, 64px);
            /* flex-direction: column; */
            justify-content: center;
            align-items: center;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }

        a {
            font-size: 16px;
            font-weight: 400;
            color: #064971;
        }

        nav > button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        
        button > p {
            font-size: 16px;
            font-weight: 400;
            color: #064971;
        }

        .btn-wrapper {
            display: flex;
            gap: 16px;
        }

        .btn-wrapper > button {
            padding: 8px 20px;
            border: 1px solid #064971;
        }

        .btn-secondary {
            background-color: #064971;
            color: white;
        }

    </style>
</head>
<body>
  <header>
        <img src="./assets/images/logobiolab.svg" alt="image biolab">
        <div class="header-nav">
            <nav>
                <a href="">Sobre a Biolab</a>
                <a href="">Empresas e Unidades</a>
                <a href="">Ser Biolab & Co.</a>
                <button>
                    <p>Saúde e Bem-Estar</p>
                    <img src="./assets/images/chevron-down.svg" alt="image chevron down">
                </button>
            </nav>
            <div class="btn-wrapper">
                <button>Seja um Fornecedor</button>
                <button class="btn-secondary">Nossos Produtos</button>
            </div>
        </div>
    </header>
</body>
</html>
